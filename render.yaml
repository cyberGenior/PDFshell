# Render Blueprint for PDFShell — all-in-one app + a managed Postgres.
#
# Deploy: Render Dashboard → New + → Blueprint → pick this repo. Render reads
# this file and provisions the database + service below. (The root ./Dockerfile
# is also the canonical build-from-source image, so a plain Docker service works
# too — just add a Postgres and set DATABASE_URL.)
#
# The web service contains everything except the optional Ollama AI sidecar:
# Next.js web + admin, and the Python converter (LibreOffice, Ghostscript,
# PyMuPDF, Tesseract, pdf2docx). State (admin, analytics, ads, AI cards,
# sessions) lives in Postgres — no disk required, so it scales cleanly.

databases:
  - name: pdfshell-db
    databaseName: pdfshell
    user: pdfshell
    # Free Postgres expires after ~30 days on Render — switch to a paid plan for
    # anything you want to keep. Bump as needed.
    plan: free

services:
  - type: web
    name: pdfshell
    runtime: docker
    # Build FROM SOURCE: the root ./Dockerfile is the all-in-one image (pnpm
    # build → Next standalone + LibreOffice/Ghostscript/PyMuPDF/Tesseract).
    dockerfilePath: ./Dockerfile
    # LibreOffice + Next + Python is memory-hungry; 512 MB (starter) tends to OOM
    # on conversions. Standard (2 GB) is the safe floor — adjust to taste.
    plan: standard
    healthCheckPath: /
    envVars:
      # Admin + analytics + ads + AI cards store. Render injects the managed
      # Postgres connection string here.
      - key: DATABASE_URL
        fromDatabase:
          name: pdfshell-db
          property: connectionString
      - key: PDFSHELL_ADMIN_USER
        value: admin
      # Set a real password in the dashboard before first sign-in.
      - key: PDFSHELL_ADMIN_PASS
        sync: false
      # Stable secret so stored AI API keys stay decryptable across restarts.
      - key: PDFSHELL_SECRET
        generateValue: true
      - key: PDFSHELL_INTERNAL_TOKEN
        generateValue: true
      # Optional self-hosted LLM for "Enhance with AI". Leave unset to ship
      # without AI (conversions use the faithful non-AI path). Point at your
      # Ollama host (needs a GPU box) to enable it.
      - key: OLLAMA_URL
        sync: false
      # Optional Google Analytics 4 + AdSense. NEXT_PUBLIC_* are inlined at build,
      # and Render supplies these to the Docker build as args — set the values
      # here (or in the dashboard) and redeploy to (de)activate.
      - key: NEXT_PUBLIC_GA_ID
        sync: false
      - key: NEXT_PUBLIC_ADSENSE_CLIENT
        sync: false
