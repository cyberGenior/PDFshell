# Render Blueprint for PDFShell — single self-sufficient all-in-one service.
#
# Deploy: Render Dashboard → New + → Blueprint → pick this repo. Render reads
# this file and provisions the service below. (The root ./Dockerfile is also the
# canonical build-from-source image, so a plain Docker service works too.)
#
# Everything except the optional Ollama AI sidecar lives in ONE container:
# Next.js web + admin, the Python converter (LibreOffice, Ghostscript, PyMuPDF,
# Tesseract, pdf2docx), and the admin/analytics store in embedded SQLite on a
# persistent disk — no external database to wire up.

services:
  - type: web
    name: pdfshell
    runtime: docker
    # Build FROM SOURCE: the root ./Dockerfile is the all-in-one image (pnpm
    # build → Next standalone + LibreOffice/Ghostscript/PyMuPDF/Tesseract).
    dockerfilePath: ./Dockerfile
    # LibreOffice + Next + Python is memory-hungry; 512 MB (starter) tends to OOM
    # on conversions. Standard (2 GB) is the safe floor — adjust to taste.
    plan: standard
    healthCheckPath: /healthz
    # Persistent disk for the SQLite admin/analytics DB. Disks require a paid
    # instance; without one the app still runs but the DB resets on each deploy.
    disk:
      name: pdfshell-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: PDFSHELL_ADMIN_USER
        value: admin
      # Set a real password in the dashboard before first sign-in.
      - key: PDFSHELL_ADMIN_PASS
        sync: false
      # Stable secret so stored AI API keys stay decryptable across restarts.
      - key: PDFSHELL_SECRET
        generateValue: true
      - key: PDFSHELL_INTERNAL_TOKEN
        generateValue: true
      # Optional self-hosted LLM for "Enhance with AI". Leave unset to ship
      # without AI (conversions use the faithful non-AI path). Point at your
      # Ollama host (needs a GPU box) to enable it.
      - key: OLLAMA_URL
        sync: false
      # Canonical/OG URLs + robots.txt + sitemap.xml. Set to your real domain
      # (e.g. https://pdfshell.onrender.com or a custom domain). NEXT_PUBLIC_* are
      # inlined at build, and Render supplies them to the Docker build as args.
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      # Optional Google Analytics 4 + AdSense. Set and redeploy to (de)activate.
      - key: NEXT_PUBLIC_GA_ID
        sync: false
      - key: NEXT_PUBLIC_ADSENSE_CLIENT
        sync: false
