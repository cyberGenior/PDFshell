# Render Blueprint for PDFShell — the self-sufficient all-in-one image.
#
# Deploy: Render Dashboard → New + → Blueprint → pick this repo. Render reads
# this file and provisions the service below. (If you created the service
# manually, instead set its Dockerfile Path to ./Dockerfile.allinone.fullbuild.)
#
# This one service contains everything except the optional Ollama AI sidecar:
# Next.js web + admin, the Python converter (LibreOffice, Ghostscript, PyMuPDF,
# Tesseract, pdf2docx), and SQLite on a persistent disk.
services:
  - type: web
    name: pdfshell
    runtime: docker
    # Build FROM SOURCE — the root ./Dockerfile expects a prebuilt apps/web/out
    # (gitignored) and will fail on a clean clone. This one runs pnpm build.
    dockerfilePath: ./Dockerfile.allinone.fullbuild
    # LibreOffice + Next + Python is memory-hungry; 512 MB (starter) tends to OOM
    # on conversions. Standard (2 GB) is the safe floor — adjust to taste.
    plan: standard
    healthCheckPath: /
    # Persistent disk so the admin SQLite DB (analytics, ads, AI cards, sessions,
    # login) survives deploys/restarts. A disk pins the service to one instance.
    disk:
      name: pdfshell-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: PDFSHELL_ADMIN_USER
        value: admin
      # Set a real password in the dashboard before first sign-in.
      - key: PDFSHELL_ADMIN_PASS
        sync: false
      # Stable secret so stored AI API keys stay decryptable across restarts.
      - key: PDFSHELL_SECRET
        generateValue: true
      - key: PDFSHELL_INTERNAL_TOKEN
        generateValue: true
      # Optional self-hosted LLM for "Enhance with AI". Leave unset to ship
      # without AI (conversions use the faithful non-AI path). Point at your
      # Ollama host (needs a GPU box) to enable it.
      - key: OLLAMA_URL
        sync: false
