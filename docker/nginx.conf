server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text assets — meaningful on metered/slow connections.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/javascript application/json
        image/svg+xml application/wasm font/woff2;

    # Hashed Next.js build assets are immutable — cache them hard.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The OCR/WASM blobs and worker scripts are also safe to cache long-term.
    location ~* \.(wasm|traineddata|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static export emits /merge.html etc. Resolve clean URLs to those files,
    # then fall back to the 404 page.
    location / {
        try_files $uri $uri.html $uri/ /404.html;
    }

    error_page 404 /404.html;
}
